<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>全球點擊挑戰 直播專用計數器 - FR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        /* --- @FR科技公司版權所有 嚴禁轉載本網站所有程式碼 --- */
        body {
            margin: 0;
            padding: 0;
            background: #000; /* 直播時在 OBS 濾鏡選「色彩鍵」去背黑色即可，或設為 transparent */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .odometer-wrapper {
            background: rgba(0, 0, 0, 0.9);
            padding: 20px 50px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 40px rgba(0,0,0,1);
        }

        .odometer {
            display: flex;
            align-items: center;
            font-size: 150px;
            font-weight: 900;
            height: 180px; /* 固定高度 */
            line-height: 180px;
            /* 讓整個區域變彩色 */
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #00ffff, #0000ff, #8b00ff, #ff0000);
            background-size: 400% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: rainbow-flow 8s linear infinite;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
        }

        @keyframes rainbow-flow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .digit-box {
            height: 180px;
            width: 95px;
            position: relative;
            overflow: hidden;
            display: none;
        }

        .digit-box.active { display: block; }

        .digit-list {
            position: absolute;
            width: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            top: 0;
        }

        .digit-list div {
            height: 180px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .comma {
            height: 180px;
            display: none;
            align-items: center;
            justify-content: center;
            padding-bottom: 20px; /* 逗號稍微往上提一點 */
        }
        .comma.active { display: flex; }
    </style>
</head>
<body>

<div class="odometer-wrapper">
    <div id="roller" class="odometer"></div>
</div>

<script>
    /* --- @FR科技公司版權所有 嚴禁轉載本網站所有程式碼 --- */
    const firebaseConfig = {
        apiKey: "AIzaSyAhstatd52tItPyVGs0yFpMr72r9yFpVY",
        authDomain: "project-3642988709307035960.firebaseapp.com",
        databaseURL: "https://project-3642988709307035960-default-rtdb.firebaseio.com",
        projectId: "project-3642988709307035960",
        appId: "1:119344257869:web:4e9c095e23eaa7bb1db504"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function initRoller() {
        const r = document.getElementById('roller'); 
        r.innerHTML = "";
        // 建立 10 位數空間
        for (let i = 0; i < 10; i++) {
            // 每三位加一個逗號
            if (i > 0 && i % 3 === 0) {
                const c = document.createElement('div');
                c.className = "comma";
                c.id = `comma-${i}`;
                c.innerText = ",";
                r.insertBefore(c, r.firstChild);
            }
            // 數字方塊
            const b = document.createElement('div');
            b.className = "digit-box";
            b.id = `box-${i}`;
            let l = `<div class="digit-list" id="list-${i}">`;
            for (let j = 0; j <= 9; j++) l += `<div>${j}</div>`;
            l += `<div>0</div></div>`; 
            b.innerHTML = l;
            r.insertBefore(b, r.firstChild);
        }
    }

    initRoller();

    function render(num) {
        const s = num.toString();
        const fullStr = s.padStart(10, "0");
        
        for (let i = 0; i < 10; i++) {
            const box = document.getElementById(`box-${i}`);
            const list = document.getElementById(`list-${i}`);
            const val = parseInt(fullStr[10 - 1 - i]);

            if (i < s.length) {
                box.classList.add('active');
                if (i % 3 === 0 && i > 0) {
                    const comma = document.getElementById(`comma-${i}`);
                    if(comma) comma.classList.add('active');
                }
                // 核心修復：強制對齊位移量
                list.style.transform = `translateY(-${val * 180}px)`;
            } else {
                box.classList.remove('active');
                const comma = document.getElementById(`comma-${i}`);
                if(comma) comma.classList.remove('active');
            }
        }
    }

    db.ref('global_counter').on('value', s => {
        const val = s.val() || 0;
        render(val);
    });
</script>
</body>
</html>
