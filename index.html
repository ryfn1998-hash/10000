<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>全球點擊挑戰直播專用 - 幻彩外框計數器 - FR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        /* --- @FR科技公司版權所有 嚴禁轉載本網站所有程式碼 --- */
        body {
            margin: 0;
            padding: 0;
            background: transparent; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        /* --- 這裡修改外框背景為流動彩色 --- */
        .odometer-wrapper {
            /* 彩色漸變背景 */
            background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #00ffff, #0000ff, #8b00ff, #ff0000);
            background-size: 600% 600%; /* 放大背景尺寸以便移動 */
            animation: flow-bg 10s ease infinite; /* 背景流動動畫 */
            
            padding: 30px 60px;
            border-radius: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            position: relative;
        }

        /* 背景流動動畫定義 */
        @keyframes flow-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 數字顯示，維持白色並加強陰影，確保在彩色背景下清晰 */
        .odometer {
            display: flex;
            align-items: center;
            font-size: 150px;
            font-weight: 900;
            height: 180px;
            line-height: 180px;
            color: #ffffff; /* 數字維持白色 */
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.5); /* 增加黑影避免被背景吃掉 */
        }

        .digit-box {
            height: 180px;
            width: 95px;
            position: relative;
            overflow: hidden;
            display: none;
        }

        .digit-box.active { display: block; }

        .digit-list {
            position: absolute;
            width: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            top: 0;
        }

        .digit-list div {
            height: 180px;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .comma {
            height: 180px;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 130px;
            color: #fff;
            padding-bottom: 20px;
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }
        .comma.active { display: flex; }
    </style>
</head>
<body>

<div class="odometer-wrapper">
    <div id="roller" class="odometer"></div>
</div>

<script>
    /* --- @FR科技公司版權所有 嚴禁轉載本網站所有程式碼 --- */
    const firebaseConfig = {
        apiKey: "AIzaSyAhstatd52tItPyVGs0yFpMr72r9yFpVY",
        authDomain: "project-3642988709307035960.firebaseapp.com",
        databaseURL: "https://project-3642988709307035960-default-rtdb.firebaseio.com",
        projectId: "project-3642988709307035960",
        appId: "1:119344257869:web:4e9c095e23eaa7bb1db504"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function initRoller() {
        const r = document.getElementById('roller'); 
        r.innerHTML = "";
        for (let i = 0; i < 10; i++) {
            if (i > 0 && i % 3 === 0) {
                const c = document.createElement('div');
                c.className = "comma";
                c.id = `comma-${i}`;
                c.innerText = ",";
                r.insertBefore(c, r.firstChild);
            }
            const b = document.createElement('div');
            b.className = "digit-box";
            b.id = `box-${i}`;
            let l = `<div class="digit-list" id="list-${i}">`;
            for (let j = 0; j <= 9; j++) l += `<div>${j}</div>`;
            l += `<div>0</div></div>`; 
            b.innerHTML = l;
            r.insertBefore(b, r.firstChild);
        }
    }

    initRoller();

    function render(num) {
        const s = num.toString();
        const fullStr = s.padStart(10, "0");
        for (let i = 0; i < 10; i++) {
            const box = document.getElementById(`box-${i}`);
            const list = document.getElementById(`list-${i}`);
            const val = parseInt(fullStr[10 - 1 - i]);
            if (i < s.length) {
                box.classList.add('active');
                if (i % 3 === 0 && i > 0) {
                    const comma = document.getElementById(`comma-${i}`);
                    if(comma) comma.classList.add('active');
                }
                list.style.transform = `translateY(-${val * 180}px)`;
            } else {
                box.classList.remove('active');
                const comma = document.getElementById(`comma-${i}`);
                if(comma) comma.classList.remove('active');
            }
        }
    }

    db.ref('global_counter').on('value', s => render(s.val() || 0));
</script>
</body>
</html>
